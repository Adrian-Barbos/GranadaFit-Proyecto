<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GranadaFit | Crear cuenta</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #007bff;
            --dark-color: #2f2f2f;
            --light-bg: #f5f8fc;
            --white: #ffffff;
            --muted: #6c757d;
            --border: #e6edf5;
            --shadow: 0 22px 48px rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: var(--light-bg);
            color: var(--dark-color);
        }

        .register-page {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1.05fr 0.95fr;
        }

        .brand-panel {
            position: relative;
            background:
                linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,86,214,0.52)),
                url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=1470&auto=format&fit=crop') center/cover;
            color: var(--white);
            padding: 58px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
        }

        .logo span {
            color: var(--primary-color);
        }

        .brand-content {
            max-width: 560px;
        }

        .brand-content span {
            display: inline-block;
            margin-bottom: 16px;
            padding: 7px 16px;
            border-radius: 999px;
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.2);
            font-weight: 700;
            font-size: 0.85rem;
        }

        .brand-content h1 {
            font-size: 3rem;
            line-height: 1.1;
            margin-bottom: 16px;
        }

        .brand-content p {
            color: rgba(255,255,255,0.78);
            line-height: 1.8;
            font-size: 1.02rem;
        }

        .form-panel {
            background: var(--white);
            padding: 48px 8%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .back-link {
            position: absolute;
            top: 30px;
            right: 8%;
            color: var(--dark-color);
            text-decoration: none;
            font-weight: 700;
            background: #f1f5fb;
            padding: 10px 18px;
            border-radius: 999px;
            transition: 0.3s ease;
        }

        .back-link:hover {
            background: var(--dark-color);
            color: var(--white);
            transform: translateY(-2px);
        }

        .form-wrapper {
            width: 100%;
            max-width: 450px;
        }

        .form-wrapper h2 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--muted);
            line-height: 1.7;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 17px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 0.94rem;
        }

        .form-group input {
            width: 100%;
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 14px 15px;
            font-size: 1rem;
            outline: none;
            background: #fbfdff;
            transition: 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(0,123,255,0.12);
            background: var(--white);
        }

        .btn-auth {
            width: 100%;
            border: none;
            border-radius: 999px;
            padding: 15px 20px;
            background: linear-gradient(135deg, var(--primary-color), #0056d6);
            color: var(--white);
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 16px 34px rgba(0,123,255,0.32);
            transition: 0.3s ease;
            margin-top: 8px;
        }

        .btn-auth:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 42px rgba(0,123,255,0.42);
        }

        .login-box {
            margin-top: 26px;
            text-align: center;
            color: var(--muted);
        }

        .login-box a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 800;
        }

        .login-box a:hover {
            text-decoration: underline;
        }

        @media (max-width: 900px) {
            .register-page {
                grid-template-columns: 1fr;
            }

            .brand-panel {
                min-height: 360px;
            }

            .form-panel {
                padding: 86px 6% 46px;
            }
        }

        @media (max-width: 560px) {
            .brand-panel {
                padding: 38px 6%;
            }

            .brand-content h1,
            .form-wrapper h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

<main class="register-page">
    <section class="brand-panel">
        <div class="logo">Granada<span>Fit</span></div>

        <div class="brand-content">
            <span>Comunidad GranadaFit</span>
            <h1>Empieza a entrenar con ventajas reales</h1>
            <p>Crea tu cuenta para acceder a productos, planes, calculadora IMC y beneficios exclusivos.</p>
        </div>
    </section>

    <section class="form-panel">
        <a th:href="@{/}" class="back-link">Volver</a>

        <div class="form-wrapper">
            <h2>Crear cuenta</h2>
            <p class="subtitle">Completa tus datos para formar parte de GranadaFit.</p>

            <form th:action="@{/register}" method="post">
                <div class="form-group">
                    <label for="fullName">Nombre completo</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Tu nombre" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Contrasena</label>
                    <input type="password" id="password" name="password" placeholder="Minimo 8 caracteres" required>
                </div>

                <button type="submit" class="btn-auth">Crear cuenta</button>
            </form>

            <div class="login-box">
                <span>Ya tienes cuenta?</span>
                <a th:href="@{/login}">Inicia sesion</a>
            </div>
        </div>
    </section>
</main>

</body>
</html>
