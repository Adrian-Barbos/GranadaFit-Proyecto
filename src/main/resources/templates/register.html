<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>GranadaFit - Registro</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
    <style>
        /* Reutilizamos los estilos del login para mantener la identidad */
        :root { --gf-dark: #333333; --gf-blue: #007bff; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }
        .split-container { display: flex; height: 100vh; width: 100%; }

        .form-section { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 4rem; background: white; }
        .form-wrapper { width: 100%; max-width: 420px; }

        .logo-bicolor { font-size: 2.5rem; font-weight: 700; margin-bottom: 1rem; }
        .logo-bicolor .text-dark { color: var(--gf-dark); }
        .logo-bicolor .text-blue { color: var(--gf-blue); }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #eaeaea; border-radius: 8px; box-sizing: border-box; }

        .btn-access { width: 100%; background: var(--gf-blue); color: white; padding: 14px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 1rem; }

        /* Imagen de la derecha (usando la que te funcionó de Internet) */
        .image-section { flex: 1; background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1470&auto=format&fit=crop'); background-size: cover; background-position: center; position: relative; }
        .image-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); }
    </style>
</head>
<body>
<div class="split-container">
    <div class="form-section">
        <div class="form-wrapper">
            <div class="logo-bicolor">
                <span class="text-dark">Granadaa</span><span class="text-blue">Fit</span>
            </div>
            <h1>Crea tu cuenta</h1>
            <p style="color: #666; margin-bottom: 2rem;">Únete a la comunidad de GranadaFit</p>

            <form th:action="@{/register}" method="post">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" name="fullName" placeholder="Tu nombre" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" name="password" placeholder="Mínimo 8 caracteres" required>
                </div>
                <button type="submit" class="btn-access">Crear Cuenta</button>
            </form>

            <div style="margin-top: 2rem; text-align: center; font-size: 0.9rem;">
                ¿Ya tienes cuenta? <a th:href="@{/login}" style="color: var(--gf-blue); font-weight: 600; text-decoration: none;">Inicia sesión aquí</a>
            </div>
        </div>
    </div>
    <div class="image-section"><div class="image-overlay"></div></div>
</div>
</body>
</html>
