<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GranadaFit - Acceso Profesional</title>
    <link rel="stylesheet" th:href="@{/styles.css}">

    <style>
        /* Estilos Globales para esta página */
        :root {
            --gf-dark: #333333; /* El color gris oscuro de tu logo */
            --gf-blue: #007bff; /* El color azul de tu logo */
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Fuente profesional */
            overflow: hidden; /* Evita scrolls extraños */
        }

        /* Contenedor principal dividido */
        .split-container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* --- SECCIÓN IZQUIERDA: FORMULARIO --- */
        .form-section {
            flex: 1; /* Ocupa el 50% */
            background-color: white;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centrado vertical */
            align-items: center; /* Centrado horizontal */
            padding: 4rem;
            box-sizing: border-box;
            position: relative;
        }

        .form-wrapper {
            width: 100%;
            max-width: 420px; /* Ancho máximo profesional para formularios */
            text-align: left;
        }

        /* LOGO BUCUOLOR (RECREACIÓN DE TU IMAGEN) */
        .logo-bicolor {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
        }
        .logo-bicolor .text-dark {
            color: var(--gf-dark);
        }
        .logo-bicolor .text-blue {
            color: var(--gf-blue);
        }

        .form-section h1 {
            color: var(--gf-dark);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-section p.subtitle {
            color: #666;
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        /* Estilos de los inputs */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            color: var(--gf-dark);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #eaeaea; /* Borde suave */
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--gf-blue);
            box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.1);
        }

        /* Botón profesional */
        .btn-access {
            width: 100%;
            background-color: var(--gf-blue);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            margin-top: 1rem;
        }

        .btn-access:hover {
            background-color: #0056b3;
        }

        .btn-access:active {
            transform: scale(0.98);
        }

        /* Sección de Registro */
        .register-prompt {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: #555;
            border-top: 1px solid #eee;
            padding-top: 1.5rem;
        }

        .register-prompt a {
            color: var(--gf-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .register-prompt a:hover {
            text-decoration: underline;
        }

        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            text-decoration: none;
            color: #888;
            font-size: 0.85rem;
        }

        /* --- SECCIÓN DERECHA: IMAGEN GRANDE --- */
        .image-section {
            flex: 1; /* Ocupa el 50% */
            background-color: #eaeaea; /* Color de carga */
            background-image: url('static/img/img-index/equipo.png');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* Superposición oscurecedora para la imagen (opcional) */
        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.1) 100%);
        }

        .image-text {
            position: absolute;
            bottom: 4rem;
            left: 4rem;
            color: white;
            max-width: 400px;
        }

        .image-text h3 {
            font-size: 2.2rem;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        /* Adaptación para móviles */
        @media (max-width: 768px) {
            .split-container {
                flex-direction: column;
            }
            .image-section {
                display: none; /* Escondemos la imagen en móvil para que cargue rápido */
            }
            .form-section {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>

<div class="split-container">

    <div class="form-section">
        <a href="/" class="back-link">← Volver</a>

        <div class="form-wrapper">
            <div class="logo-bicolor">
                <span class="text-dark">Granada</span><span class="text-blue">Fit</span>
            </div>

            <h1>¡Hola de nuevo!</h1>
            <p class="subtitle">Accede a tu cuenta para ver tus pedidos y entrenos.</p>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">Usuario o Email</label>
                    <input type="text" id="username" name="username" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••••••" required>
                </div>

                <button type="submit" class="btn-access">Iniciar Sesión</button>
            </form>

            <div class="register-prompt">
                ¿Aún no tienes cuenta?
                <a href="/templates/register.html">Regístrate gratis aquí</a>.
            </div>
        </div>
    </div>

    <div class="image-section">
        <div class="image-overlay"></div>
        <img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1470&auto=format&fit=crop"
             alt="Gym" style="width: 100%; height: 100%; object-fit: cover;">
        <div class="image-text">
            <h3>Alcanza tu mejor versión en GranadaFit.</h3>
            <p>Nutrición de calidad y suplementos para atletas exigentes.</p>
        </div>
    </div>

</div>

</body>
</html>
