<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>¡Bienvenido al equipo! | GranadaFit</title>
    <style>
        body { background-color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; text-align: center; }
        .success-card { max-width: 500px; padding: 40px; }
        .icon-circle { width: 80px; height: 80px; background: #007bff; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 40px; margin: 0 auto 30px; }
        h1 { font-size: 32px; color: #1a1a1a; margin-bottom: 10px; text-transform: uppercase; }
        p { color: #666; font-size: 18px; line-height: 1.6; margin-bottom: 30px; }
        .btn-ready { background: #1a1a1a; color: white; padding: 15px 30px; border-radius: 10px; text-decoration: none; font-weight: bold; transition: 0.3s; display: inline-block; }
        .btn-ready:hover { background: #007bff; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="success-card">
    <div class="icon-circle">✓</div>
    <h1>¡Ya eres Miembro PLUS!</h1>
    <p>Tu pago se ha procesado correctamente. A partir de ahora tienes acceso ilimitado a la Calculadora Pro y tus planes personalizados.</p>

    <a th:href="@{/perfil}" class="btn-ready">IR A MI PANEL PRO</a>
</div>

</body>
</html>
