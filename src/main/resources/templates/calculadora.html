<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>GranadaFit - Calculadora</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        nav { margin-bottom: 20px; }
        nav a { text-decoration: none; color: #2c3e50; font-weight: bold; border: 1px solid #2c3e50; padding: 5px 15px; border-radius: 5px; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; }
        h1 { color: #27ae60; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #219150; }
        .result { margin-top: 20px; padding: 15px; background-color: #e8f5e9; border-left: 5px solid #27ae60; border-radius: 4px; }
        .error { color: #e74c3c; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<nav>
    <a th:href="@{/}">← Volver al Inicio</a>
</nav>

<div class="container">
    <h1>Calculadora IMC</h1>

    <form th:action="@{/calcular-imc}" method="post">
        <div class="form-group">
            <label>Peso (kg):</label>
            <input type="number" step="0.01" name="peso" th:value="${pesoEnviado}" placeholder="Ej: 75.2" required>
        </div>
        <div class="form-group">
            <label>Altura (m):</label>
            <input type="number" step="0.01" name="altura" th:value="${alturaEnviada}" placeholder="Ej: 1.75" required>
        </div>
        <button type="submit">Calcular Ahora</button>
    </form>

    <div th:if="${resultado}" class="result">
        <p>Tu IMC es: <strong th:text="${resultado}">0</strong></p>
        <p>Estado: <strong th:text="${mensaje}">Normal</strong></p>
    </div>

    <p th:if="${error}" class="error" th:text="${error}"></p>
</div>

</body>
</html>
